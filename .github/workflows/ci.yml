name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - run: pytest -q

  package:
    needs: tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create build
        run: |
          zip -r project.zip tasktracker.py test_tasktracker.py requirements.txt

      - uses: actions/upload-artifact@v4
        with:
          name: project-build
          path: project.zip